<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Segurança na Internet</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            font-size: 18px; /* Fonte maior para facilitar a leitura */
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #0056b3;
            text-align: center;
            font-size: 28px;
        }
        .intro {
            font-size: 20px;
            background-color: #e3f2fd;
            padding: 15px;
            border-left: 5px solid #0056b3;
            border-radius: 4px;
        }
        .Dica-card {
            background: #fff3cd;
            border: 1px solid #ffeeba;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .mensagem-box {
            background: #f8f9fa;
            border: 2px dashed #ccc;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .mensagem-box:hover {
            background: #e9ecef;
        }
        .resultado {
            margin-top: 10px;
            font-weight: bold;
            display: none;
            padding: 10px;
            border-radius: 5px;
        }
        .alerta { background-color: #f8d7da; color: #721c24; }
        .seguro { background-color: #d4edda; color: #155724; }
        
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div class="container">
    <h1>🛡️ Detetive da Internet: Guia Fácil de Segurança</h1>
    
    <p class="intro">
        <strong>Olá!</strong> A internet é maravilhosa para falar com a família e ver notícias, mas precisamos ter cuidado com os "malandros" virtuais.
